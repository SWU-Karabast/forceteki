name: Pull Request Checks
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
jobs:
  lint:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm install

      - run: npx eslint --quiet

  validate-cards:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm install

      - run: npm run validate-cards

  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm install

      - name: cache card data json files
        id: cache-card-data
        uses: actions/cache@v5
        with:
          path: ./test/json
          key: card-data-${{ hashFiles('card-data-version.txt', 'scripts/fetchdata.js', 'scripts/mockdata.js') }}
      - if: ${{ steps.cache-card-data.outputs.cache-hit != 'true' }}
        run: npm run get-cards

      - run: npm run test-parallel
